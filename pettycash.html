<!DOCTYPE html>

  <title>Petty Cash</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f9f9f9;
      position: relative;
    }

    h2 {
      color: #133152;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      margin-bottom: 30px;
    }

    td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    .view-btn {
      padding: 6px 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    .view-btn:hover {
      background-color: #0056b3;
    }

    .doc-icon {
      margin-right: 8px;
      vertical-align: middle;
    }

    .nav-btn {
      position: absolute;
      top: 10px;
      padding: 6px 12px;
      background-color: #133152;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    #back-btn {
      left: 10px;
    }

    #home-btn {

  </style>

</head>
